<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlsterTörn - Boots-Buchung</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 2.2em;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 12px 24px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
        }
        .nav-tab:hover { background: #e0e0e0; }
        .nav-tab.active { background: #667eea; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .week-nav button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .calendar {
            display: grid;
            grid-template-columns: 100px repeat(7, 1fr);
            gap: 2px;
            background: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .calendar-header-cell {
            background: #667eea;
            color: white;
            padding: 15px 5px;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
        }
        .boat-label {
            background: #f8f9fa;
            padding: 15px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        .slot {
            background: white;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 11px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .slot:hover:not(.booked) { background: #e8f0fe; }
        .slot.available { background: #d4edda; color: #155724; }
        .slot.booked { background: #f8d7da; color: #721c24; cursor: not-allowed; }
        .slot.partial { background: #fff3cd; color: #856404; }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .btn {
            padding: 14px 28px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { background: #5a6fd6; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .info-text {
            color: #666;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .pier-list { margin-top: 30px; }
        .pier-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .pier-item .name { font-weight: 600; color: #333; }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }
        .notification.success { background: #28a745; }
        .notification.error { background: #dc3545; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .calendar { grid-template-columns: 60px repeat(7, 1fr); font-size: 9px; }
            .nav-tabs { flex-direction: column; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛵ AlsterTörn</h1>
        <p class="subtitle">Betriebssportgruppe Boots-Buchung</p>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('calendar')">📅 Kalender</button>
            <button class="nav-tab" onclick="showTab('booking')">📝 Buchen</button>
            <button class="nav-tab" onclick="showTab('pier')">⚓ Steg</button>
        </div>
        
        <div id="calendar-section" class="section active">
            <div class="calendar-header">
                <h2>Woche vom <span id="week-start"></span></h2>
                <div class="week-nav">
                    <button onclick="changeWeek(-1)">← Vorherige</button>
                    <button onclick="changeWeek(1)">Nächste →</button>
                </div>
            </div>
            <div id="calendar" class="calendar"></div>
            <div class="legend">
                <span>🟢 Frei</span>
                <span>🟡 Teilweise</span>
                <span>🔴 Voll</span>
            </div>
        </div>

        <div id="booking-section" class="section">
            <h2>Boot buchen</h2>
            <form onsubmit="handleBooking(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="book-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="book-email" required>
                    </div>
                </div>
